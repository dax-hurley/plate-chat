# Continuous integration: lint, typecheck, and Next.js build.
# Production uses Turso (libsql://…) via SST secrets — see deploy.yml and sst.config.ts.
# This job uses a throwaway file SQLite DB so the build never touches Turso.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare local DB path
        run: mkdir -p data

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        env:
          # NextAuth / Next build — placeholders only; no real auth or Turso in CI.
          AUTH_SECRET: ci-placeholder-auth-secret-min-32-chars-long
          DATABASE_URL: file:./data/ci-build.db
          AUTH_URL: http://127.0.0.1:3000
          NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
        run: npm run build
