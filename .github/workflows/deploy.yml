# Deploy TanStack Start to AWS with SST v4 (multiple stages).
#
# Stages: `staging` and `production` (SST `--stage` / stack isolation).
#
# GitHub Environments (Settings → Environments): create `staging` and `production`.
# Put deploy secrets on each environment with the SAME names so one workflow fits both:
#   TURSO_DATABASE_URL, TURSO_AUTH_TOKEN, BETTER_AUTH_SECRET, APP_URL, ANTHROPIC_API_KEY
# Optional per environment: override repository variable AWS_REGION.
#
# Repository secret (any environment): AWS_ROLE_ARN — IAM role for GitHub OIDC → AWS.
#   If staging uses a different AWS account, add AWS_ROLE_ARN to that environment’s secrets
#   (environment secrets override repository secrets when the job uses `environment:`).
#
# Triggers:
#   • push to `main`     → deploy production
#   • push to `staging` or `develop` → deploy staging
#   • workflow_dispatch  → choose staging or production
#
# ANTHROPIC_API_KEY is required for production deploys; optional for staging (coach/list features
# return 503 if unset — fine for infra-only staging).
#
# GitHub OIDC setup:
# https://docs.github.com/en/actions/deployment/security-hardening-your-deployments/configuring-openid-connect-in-amazon-web-services

name: Deploy

on:
  workflow_dispatch:
    inputs:
      stage:
        description: SST stage (use a GitHub Environment with the same name)
        type: choice
        required: true
        default: staging
        options:
          - staging
          - production
  push:
    branches:
      - main
      - staging
      - develop

concurrency:
  # workflow_dispatch: include chosen stage so two manual deploys (same branch) do not cancel each other.
  group: deploy-${{ github.workflow }}-${{ github.ref }}-${{ github.event.inputs.stage || 'push' }}
  cancel-in-progress: false

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      stage: ${{ steps.pick.outputs.stage }}
    steps:
      - name: Resolve SST stage
        id: pick
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            STAGE="${{ inputs.stage }}"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            STAGE=production
          elif [ "${{ github.ref }}" = "refs/heads/staging" ] || [ "${{ github.ref }}" = "refs/heads/develop" ]; then
            STAGE=staging
          else
            echo "::error::Unsupported ref for deploy: ${{ github.ref }}"
            exit 1
          fi
          echo "stage=${STAGE}" >> "$GITHUB_OUTPUT"
          echo "Resolved SST stage: ${STAGE}"

  deploy:
    needs: resolve
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: ${{ needs.resolve.outputs.stage }}
    outputs:
      cloudfront_url: ${{ steps.cloudfront.outputs.url }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Sync GitHub secrets to SST
        env:
          STAGE: ${{ needs.resolve.outputs.stage }}
          TursoDatabaseUrl: ${{ secrets.TURSO_DATABASE_URL }}
          TursoAuthToken: ${{ secrets.TURSO_AUTH_TOKEN }}
          BetterAuthSecret: ${{ secrets.BETTER_AUTH_SECRET }}
          AppUrl: ${{ secrets.APP_URL }}
          AnthropicApiKey: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -euo pipefail
          umask 077
          if [ "${STAGE}" = "production" ] && [ -z "${AnthropicApiKey:-}" ]; then
            echo "::error::Production deploy requires ANTHROPIC_API_KEY on the production environment."
            exit 1
          fi
          secrets_file="$(mktemp)"
          {
            echo "TursoDatabaseUrl=${TursoDatabaseUrl}"
            echo "TursoAuthToken=${TursoAuthToken}"
            echo "BetterAuthSecret=${BetterAuthSecret}"
            echo "AppUrl=${AppUrl}"
            echo "AnthropicApiKey=${AnthropicApiKey}"
          } >"$secrets_file"
          npx sst secret load "$secrets_file" --stage "${STAGE}"
          rm -f "$secrets_file"

      - name: Deploy to AWS (SST)
        env:
          STAGE: ${{ needs.resolve.outputs.stage }}
          NODE_OPTIONS: --max-old-space-size=6144
        run: |
          set -o pipefail
          npx sst deploy --stage "${STAGE}" 2>&1 | tee sst-deploy.log

      - name: CloudFront URL
        id: cloudfront
        env:
          STAGE: ${{ needs.resolve.outputs.stage }}
        run: |
          set -euo pipefail
          EXPORT="$(npx sst state export --stage "$STAGE")"
          URL="$(printf '%s' "$EXPORT" | jq -r '
            .deployment.outputs.cloudfrontUrl.value?
            // .deployment.outputs.cloudfrontUrl?
            // empty
          ')"
          if [ -z "$URL" ] || [ "$URL" = "null" ]; then
            URL="$(printf '%s' "$EXPORT" | jq -r '
              .. | objects | select(has("cloudfrontUrl")) | .cloudfrontUrl
              | if type == "string" then . else .value? // empty end
            ' | head -n1)"
          fi
          if [ -z "$URL" ] || [ "$URL" = "null" ]; then
            URL="$(grep -oE 'https://[a-z0-9]+\.cloudfront\.net[^[:space:]]*' sst-deploy.log 2>/dev/null | tail -n1 || true)"
          fi
          if [ -z "$URL" ]; then
            echo "::warning::Could not resolve CloudFront URL from SST state or deploy log."
            exit 0
          fi
          echo "url=${URL}" >> "$GITHUB_OUTPUT"
          echo "::notice::CloudFront URL (${STAGE}): ${URL}"
          {
            echo "## Deploy — ${STAGE}"
            echo
            echo "**CloudFront URL:** ${URL}"
          } >> "$GITHUB_STEP_SUMMARY"
