# Build the Capacitor Android APK and attach it to a GitHub Release for the same tag.
#
# Triggers: push a tag like v1.0.0, or run workflow manually and enter the tag to build.
#
# GitHub Environments (Settings → Environments): use the same names as web deploy (`staging`,
# `prod`). Put **Variables** on each environment, e.g.:
#   - VITE_API_URL — public HTTPS base the APK should use (CloudFront / app URL). If unset,
#     the build falls back to http://127.0.0.1:3000 (dry run only, not for real devices).
#
# Environment selection:
#   - workflow_dispatch: choose **stage** (staging | prod) — same idea as Deploy.
#   - push tag v*: resolved from the tagged commit vs origin/main, origin/staging, origin/develop
#     (tip match), then tag name heuristics (*-staging*, *-rc*, *beta* → staging); otherwise prod.
#
# Build environment otherwise matches `.github/workflows/ci.yml` (local file DB, placeholders).

name: Android release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to build (e.g. v1.0.0)"
        required: true
        type: string
      stage:
        description: "GitHub Environment (same as web deploy)"
        type: choice
        required: true
        default: prod
        options:
          - staging
          - prod

concurrency:
  group: android-release-${{ github.workflow }}-${{ github.event.inputs.tag || github.ref }}-${{ github.event.inputs.stage || 'tag' }}
  cancel-in-progress: true

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.pick.outputs.environment }}
      tag_name: ${{ steps.meta.outputs.tag_name }}
      checkout_ref: ${{ steps.meta.outputs.checkout_ref }}
    steps:
      - name: Set tag and checkout ref
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            T="${{ github.event.inputs.tag }}"
            T="${T#refs/tags/}"
            echo "tag_name=${T}" >> "$GITHUB_OUTPUT"
            echo "checkout_ref=refs/tags/${T}" >> "$GITHUB_OUTPUT"
          else
            T="${{ github.ref_name }}"
            T="${T#refs/tags/}"
            echo "tag_name=${T}" >> "$GITHUB_OUTPUT"
            echo "checkout_ref=${{ github.ref }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.checkout_ref }}
          fetch-depth: 0

      - name: Resolve GitHub Environment
        id: pick
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENVIRONMENT="${{ inputs.stage }}"
          else
            git fetch origin main staging develop 2>/dev/null || git fetch origin
            HEAD_SHA=$(git rev-parse HEAD)
            MAIN_SHA=$(git rev-parse origin/main 2>/dev/null || true)
            STAGING_SHA=$(git rev-parse origin/staging 2>/dev/null || true)
            DEVELOP_SHA=$(git rev-parse origin/develop 2>/dev/null || true)

            if [ -n "$MAIN_SHA" ] && [ "$HEAD_SHA" = "$MAIN_SHA" ]; then
              ENVIRONMENT=prod
            elif [ -n "$STAGING_SHA" ] && [ "$HEAD_SHA" = "$STAGING_SHA" ]; then
              ENVIRONMENT=staging
            elif [ -n "$DEVELOP_SHA" ] && [ "$HEAD_SHA" = "$DEVELOP_SHA" ]; then
              ENVIRONMENT=staging
            elif [[ "$REF_NAME" == *-staging* ]] || [[ "$REF_NAME" == *-rc* ]] || [[ "$REF_NAME" == *beta* ]]; then
              ENVIRONMENT=staging
            else
              ENVIRONMENT=prod
            fi
            echo "Resolved environment for tag ${REF_NAME}: ${ENVIRONMENT}"
          fi
          echo "environment=${ENVIRONMENT}" >> "$GITHUB_OUTPUT"

  build-and-release:
    needs: resolve
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: ${{ needs.resolve.outputs.environment }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.checkout_ref }}

      # workflow_dispatch always uses the workflow file from the default branch, but checkout is
      # the requested tag. Tags created before scripts/ensure-capacitor-index-html.mjs existed
      # would otherwise fail MODULE_NOT_FOUND while still running this updated workflow.
      - name: Capacitor helper script (manual run vs older tag)
        if: github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail
          if [ ! -f scripts/ensure-capacitor-index-html.mjs ]; then
            DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
            git fetch --no-tags origin "${DEFAULT_BRANCH}"
            mkdir -p scripts
            git show "origin/${DEFAULT_BRANCH}:scripts/ensure-capacitor-index-html.mjs" > scripts/ensure-capacitor-index-html.mjs
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-35 build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install dependencies
        run: npm ci

      - name: Prepare local DB path
        run: mkdir -p data

      - name: Web build (Capacitor)
        env:
          NODE_OPTIONS: --max-old-space-size=6144
          # Nitro `node-server` for a bootable `.output/server` (SSR snapshot only — APK uses static files).
          # Override org/repo env that might set SERVER_PRESET / NITRO_PRESET to `aws-lambda` (would emit `awslambda.*` in `.output/server` and break this script under plain Node).
          NITRO_PRESET: node-server
          CAPACITOR_WEB_BUILD: "1"
          AUTH_SECRET: ci-placeholder-auth-secret-min-32-chars-long
          BETTER_AUTH_SECRET: ci-placeholder-better-auth-secret-32ch-minimum
          DATABASE_URL: file:./data/android-release-build.db
          AUTH_URL: ${{ vars.VITE_API_URL || 'http://127.0.0.1:3000' }}
          APP_URL: ${{ vars.VITE_API_URL || 'http://127.0.0.1:3000' }}
          BETTER_AUTH_URL: ${{ vars.VITE_API_URL || 'http://127.0.0.1:3000' }}
          NEXT_PUBLIC_APP_URL: ${{ vars.VITE_API_URL || 'http://127.0.0.1:3000' }}
          VITE_API_URL: ${{ vars.VITE_API_URL || 'http://127.0.0.1:3000' }}
        run: |
          npm run build
          node scripts/ensure-capacitor-index-html.mjs

      - name: Capacitor sync
        run: npx cap sync

      - name: Assemble debug APK
        working-directory: android
        run: chmod +x gradlew && ./gradlew assembleDebug

      - name: Name artifact
        id: out
        run: |
          TAG_NAME="${{ needs.resolve.outputs.tag_name }}"
          cp android/app/build/outputs/apk/debug/app-debug.apk "PlateChat-${TAG_NAME}.apk"
          echo "Wrote PlateChat-${TAG_NAME}.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.tag_name }}
          name: "PlateChat ${{ needs.resolve.outputs.tag_name }} (${{ needs.resolve.outputs.environment }})"
          files: "PlateChat-*.apk"
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
